<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name ="viewport" content="width=device-width , initial-scale=1.0">
        <title>Study Recommender</title>
        <style>
            body {
                font-family: Arial , sans-serif;
                max-width : 600px;
                margin : 50px auto;
                padding : 20px;
                background-color: #f4f4f4;


            }
            h1 {
                text-align : center;
                color : #333333;
            }
            input {
                width: 100%;
                padding: 10px; 
                margin: 8px 0;
                border: 1px solid #ccc;
                border-radius: 5px;

            }
            button {
                width: 100%;
                padding : 12px;
                background-color: #4CAF50;
                color: white;
                border: none;
                cursor:pointer ;
                font-size: 16px;

            }
            button:hover {
                background-color : #45a049;
            
            }
            #result {
                margin-top: 20px;
                padding: 15px;
                background-color: white;
                border-radius: 5px;
                display: none;

            }
            </style>
        </head>
        <body>
             <h1>AI Study Recommender</h1>
             <label>First Term Grade (G1)</label>
             <input type="number" id="G1" placeholder="Enter G1 (0-20)">

             <label>Second Term Grade (G2)</label>
             <input type="number" id="G2" placeholder="Enter G2 (0-20)">

             <label>Study Time (1-4)</label>
             <input type="number" id="studytime" placeholder="1=low, 2=medium, 3=high, 4=very high">

             <label>Past Failures</label>
             <input type="number" id="failures" placeholder="Number of past failures">

             <label>Absences</label>
             <input type="number" id="absences" placeholder="Number of absences">

             <label>Mother's education (0-4)</label>
             <input type="number" id="Medu" placeholder="0=none, 4=higher education">

             <label> Father's Education (0-4)</label>
             <input type="number" id="Fedu" placeholder="0=none, 4=higher education">

             <button onclick="getRecommendation()">Get Recommendation</button>

             <div id="result">
                <h3>Predicted Grade: <span id="grade"></span></h3>
                <p>Recommendation: <span id="recommendation"></span></p>
            </div>

            <script>
                async function getRecommendation() {
                    const data = {
                        G1: parseInt(document.getElementById('G1').value),
                        G2: parseInt(document.getElementById('G2').value),
                        studytime: parseInt(document.getElementById('studytime').value),
                        failures: parseInt(document.getElementById('failures').value),
                        absences: parseInt(document.getElementById('absences').value),
                        Medu: parseInt(document.getElementById('Medu').value),
                        Fedu: parseInt(document.getElementById('Fedu').value)

                    };
                    const response = await fetch('http://127.0.0.1:5000/predict' ,{
                        method: 'POST' ,
                        headers: { 'Content-Type': 'application/json'} ,
                        body: JSON.stringify(data)

                    });
                    const result = await response.json();
                    document.getElementById('grade').textContent = result.predicted_grade;
                    document.getElementById('recommendation').textContent = result.recommendation;
                    document.getElementById('result').style.display = 'block';

                }
                </script>
                </body>
                </html>
